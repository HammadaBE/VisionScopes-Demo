<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}VisionScopes{% endblock %}</title>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            Hello {{ user.username }}! |
            <a href="{% url 'web:dashboard' %}">Dashboard</a> |
            <a href="{% url 'web:logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a> |
            <a href="{% url 'web:signup' %}">Sign up</a>
        {% endif %}
    </nav>
    <hr/>
    {% block content %}{% endblock %}
</body>
</html>
