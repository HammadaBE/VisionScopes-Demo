services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: visionscopes_db
      POSTGRES_USER: visionscopes_user
      POSTGRES_PASSWORD: ${DB_PWD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visionscopes_user -d visionscopes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: hammadabe/visionscopes-backend:latest
    restart: always
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8020:8000"

  frontend:
    image: hammadabe/visionscopes-frontend:latest
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
